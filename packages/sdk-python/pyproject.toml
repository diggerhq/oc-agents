[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "oshu"
version = "0.1.0"
description = "Official Python SDK for Oshu - Run AI agents programmatically"
readme = "README.md"
license = "MIT"
authors = [
    { name = "Oshu", email = "hello@oshu.dev" }
]
keywords = ["oshu", "ai", "agents", "sdk", "automation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.9"
dependencies = [
    "websockets>=12.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://oshu.dev"
Documentation = "https://oshu.dev/docs/sdk"
Repository = "https://github.com/oshu-ai/oshu-sdk"
Issues = "https://github.com/oshu-ai/oshu-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["oshu"]

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
