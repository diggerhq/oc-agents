app = 'primeintuition'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  PUBLIC_URL = 'https://oshu.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'primeintuition_data'
  destination = '/data'

[checks]
  [checks.health]
    type = 'http'
    port = 3000
    path = '/api/health'
    interval = '30s'
    timeout = '5s'
